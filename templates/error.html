{% extends "base.html" %}
{% set title = (status_code ~ " - 文件管理系统") if status_code else "错误 - 文件管理系统" %}
{% block content %}
<section class="error-layout">
  <p class="eyebrow">Error</p>
  <p class="error-code">{{ status_code }}</p>
  <p class="muted error-message">{{ message }}</p>
  <div class="button-row error-actions">
    <a class="button-link secondary-button" href="/dashboard">返回文件列表</a>
    <a class="button-link secondary-button" href="/account">返回用户信息</a>
  </div>
</section>
{% endblock %}
