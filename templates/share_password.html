{% extends "base.html" %}
{% set title = "分享访问验证 - 文件管理系统" %}
{% block content %}
<section class="auth-panel share-auth-panel">
  <div>
    <p class="eyebrow">Shared</p>
    <h1>分享访问验证</h1>
  </div>
  <p class="muted">该分享链接受密码保护，请输入访问密码。</p>
  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}
  <form method="post" action="/share/{{ token }}" class="form-stack">
    <label>
      <span>访问密码</span>
      <input type="password" name="password" autocomplete="off" required autofocus>
    </label>
    <button type="submit">查看分享</button>
  </form>
</section>
{% endblock %}
