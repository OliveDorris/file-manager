{% extends "base.html" %}
{% set title = "分享访问验证 - 文件管理系统" %}
{% block content %}
<section class="account-layout">
  <div class="section-head">
    <div>
      <p class="eyebrow">Shared</p>
      <h1>分享访问验证</h1>
      <p class="muted">该分享链接受密码保护，请输入访问密码。</p>
    </div>
  </div>
  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}
  <form method="post" action="/share/{{ token }}" class="form-stack modal-form">
    <label>
      <span>访问密码</span>
      <input type="password" name="password" required autofocus>
    </label>
    <div class="button-row">
      <button type="submit">查看分享</button>
    </div>
  </form>
</section>
{% endblock %}
