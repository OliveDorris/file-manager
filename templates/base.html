<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "文件管理系统" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/dashboard">文件管理系统</a>
    {% if user %}
      <nav class="nav">
        {% if user.is_admin %}
          <a class="notification-link" href="/account#access-requests" aria-label="待审批申请" title="待审批申请">
            <span class="notification-icon" aria-hidden="true">&#128276;</span>
            {% if pending_request_count %}
              <span class="notification-badge">{{ pending_request_count if pending_request_count < 100 else "99+" }}</span>
            {% endif %}
          </a>
        {% endif %}
        <a class="user-link" href="/account">{{ user.username }}</a>
        <a href="/logout">退出</a>
      </nav>
    {% endif %}
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
