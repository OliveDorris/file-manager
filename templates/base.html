<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "文件管理系统" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/dashboard">文件管理系统</a>
    {% if user %}
      <nav class="nav">
        <span>{{ user.username }}</span>
        <a href="/logout">退出</a>
      </nav>
    {% endif %}
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
